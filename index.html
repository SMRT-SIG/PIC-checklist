<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIC Access - SCD Checklist</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin: 0 0 5px 0;
            font-size: 1.5em;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin: 0 0 20px 0;
            font-size: 0.9em;
        }
        
        /* Status Bar */
        .status-bar {
            text-align: center;
            padding: 12px;
            background: #fff3cd;
            color: #856404;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 20px;
            transition: all 0.4s ease;
            font-size: 1.1em;
        }
        .status-bar.pass {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            from { box-shadow: 0 0 5px rgba(40, 167, 69, 0.5); }
            to { box-shadow: 0 0 15px rgba(40, 167, 69, 0.8); }
        }

        /* Sections */
        .section {
            margin-bottom: 25px;
        }
        h2 {
            color: #34495e;
            font-size: 1.2em;
            border-left: 5px solid #3498db;
            padding-left: 10px;
            margin-bottom: 10px;
        }

        /* Task Items */
        .task {
            display: flex;
            align-items: flex-start;
            padding: 12px;
            margin: 8px 0;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #e9ecef;
        }
        .task:hover {
            background: #e9ecef;
        }
        .task input[type="checkbox"] {
            margin-right: 12px;
            margin-top: 3px;
            transform: scale(1.3);
            cursor: pointer;
            accent-color: #27ae60;
        }
        .task-text {
            flex: 1;
            line-height: 1.4;
        }
        
        /* Completed State */
        .task.completed {
            background: #e2f0d9;
            border-color: #c3e6cb;
        }
        .task.completed .task-text {
            text-decoration: line-through;
            color: #6c757d;
        }

        .time {
            font-weight: bold;
            color: #2980b9;
            margin-right: 8px;
            font-family: monospace;
            font-size: 1.05em;
        }
        .remark {
            display: block;
            color: #e74c3c;
            font-weight: bold;
            font-size: 0.85em;
            margin-top: 4px;
        }

        /* Completion Message */
        .completion-msg {
            text-align: center;
            font-size: 1.4em;
            color: #27ae60;
            font-weight: bold;
            margin-top: 20px;
            padding: 15px;
            background: #eafaf1;
            border-radius: 8px;
            border: 2px dashed #27ae60;
            display: none;
        }
        .completion-msg.show {
            display: block;
        }

        /* Reset Button */
        .reset-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #95a5a6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }
        .reset-btn:hover {
            background: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>PIC Access Checklist</h1>
    <p class="subtitle">Short Circuit Device (SCD) Check & Pre-Check</p>

    <div class="status-bar" id="statusBar">Status: In Progress (0/7)</div>

    <!-- Pre-Work -->
    <div class="section">
        <h2>📋 Pre-Work</h2>
        <label class="task">
            <input type="checkbox" class="task-check">
            <span class="task-text">Fill in form SCD Check n Pre-Check</span>
        </label>
    </div>

    <!-- Book In -->
    <div class="section">
        <h2>🟢 Book In</h2>
        <label class="task">
            <input type="checkbox" class="task-check">
            <span class="task-text">
                <span class="time">0030 Hrs</span> Book in AGAT part 1
            </span>
        </label>
        <label class="task">
            <input type="checkbox" class="task-check">
            <span class="task-text">
                <span class="time">0130 Hrs</span> Book in part 2 AGAT
                <span class="remark">⚠️ Input Remark: Install SCD</span>
            </span>
        </label>
        <label class="task">
            <input type="checkbox" class="task-check">
            <span class="task-text">
                <span class="time">0140 Hrs</span> TOA Clear Radio Check TSC
            </span>
        </label>
        <label class="task">
            <input type="checkbox" class="task-check">
            <span class="task-text">
                <span class="time">0145 Hrs</span> Install SCD with LED & take photo with Time stamp
            </span>
        </label>
    </div>

    <!-- Book Out -->
    <div class="section">
        <h2>🔴 Book Out</h2>
        <label class="task">
            <input type="checkbox" class="task-check">
            <span class="task-text">
                <span class="time">0300 Hrs</span> Remove SCD & take photo with Time stamp
            </span>
        </label>
        <label class="task">
            <input type="checkbox" class="task-check">
            <span class="task-text">
                <span class="time">0330 Hrs</span> Book Out
                <span class="remark">⚠️ Input Remark: Removed SCD</span>
            </span>
        </label>
    </div>

    <div class="completion-msg" id="completionMessage">
        ✅ ALL TASKS COMPLETED<br>TASK PASS
    </div>

    <button class="reset-btn" id="resetBtn">Reset Checklist</button>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const checkboxes = document.querySelectorAll('.task-check');
        const statusBar = document.getElementById('statusBar');
        const completionMsg = document.getElementById('completionMessage');
        const resetBtn = document.getElementById('resetBtn');
        const totalTasks = checkboxes.length;

        // Listen for checkbox changes
        checkboxes.forEach(cb => {
            cb.addEventListener('change', function() {
                const taskLabel = this.closest('.task');
                
                // Toggle visual completion
                if (this.checked) {
                    taskLabel.classList.add('completed');
                } else {
                    taskLabel.classList.remove('completed');
                }
                
                updateStatus();
            });
        });

        // Reset button logic
        resetBtn.addEventListener('click', () => {
            checkboxes.forEach(cb => {
                cb.checked = false;
                cb.closest('.task').classList.remove('completed');
            });
            updateStatus();
        });

        // Update progress and pass status
        function updateStatus() {
            const checkedCount = document.querySelectorAll('.task-check:checked').length;
            
            if (checkedCount === totalTasks) {
                // ALL TASKS PASSED
                statusBar.textContent = 'Status: TASK PASS ✅';
                statusBar.classList.add('pass');
                completionMsg.classList.add('show');
            } else {
                // IN PROGRESS
                statusBar.textContent = `Status: In Progress (${checkedCount}/${totalTasks})`;
                statusBar.classList.remove('pass');
                completionMsg.classList.remove('show');
            }
        }

        // Initialize on load
        updateStatus();
    });
</script>

</body>
</html>
